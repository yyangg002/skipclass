<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkipClass Smart Pass</title>
  <style>
    :root {
      --brand: #2563eb;
      --line: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --ok-bg: #dcfce7;
      --ok-text: #166534;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background: #f8fafc;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }
    h1 { margin: 0 0 8px; font-size: 1.35rem; color: var(--brand); }
    .sub { margin: 0 0 16px; color: var(--muted); font-size: 0.95rem; }
    .ok {
      background: var(--ok-bg);
      color: var(--ok-text);
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
    }
    .label { font-size: 0.8rem; color: var(--muted); margin-bottom: 4px; }
    .value { font-weight: 600; word-break: break-word; }
    .full { grid-column: 1 / -1; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Smart Pass Coupon Detail</h1>
    <p class="sub">Scanned from SkipClass QR</p>
    <div class="ok">Verified coupon information</div>
    <section class="grid">
      <div class="item"><div class="label">Student</div><div class="value" id="student">-</div></div>
      <div class="item"><div class="label">Coupon ID</div><div class="value" id="couponId">-</div></div>
      <div class="item full"><div class="label">Coupon Title</div><div class="value" id="title">-</div></div>
      <div class="item"><div class="label">Vendor</div><div class="value" id="vendor">-</div></div>
      <div class="item"><div class="label">Discount</div><div class="value" id="discount">-</div></div>
      <div class="item"><div class="label">Campus</div><div class="value" id="campus">-</div></div>
      <div class="item"><div class="label">Time Left</div><div class="value" id="timeLeft">-</div></div>
      <div class="item"><div class="label">Spots Left</div><div class="value" id="spotsLeft">-</div></div>
    </section>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const read = (k) => params.get(k) || '-';
    document.getElementById('student').textContent = read('student');
    document.getElementById('couponId').textContent = read('couponId');
    document.getElementById('title').textContent = read('title');
    document.getElementById('vendor').textContent = read('vendor');
    document.getElementById('discount').textContent = read('discount');
    document.getElementById('campus').textContent = read('campus');
    document.getElementById('timeLeft').textContent = read('timeLeft');
    document.getElementById('spotsLeft').textContent = read('spotsLeft');
  </script>
</body>
</html>
